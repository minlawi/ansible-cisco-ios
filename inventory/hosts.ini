[core_switches]
CSW-1 ansible_host=192.168.10.1 ansible_hostname=CSW-1
CSW-2 ansible_host=192.168.10.2 ansible_hostname=CSW-2

[dist_switches]
DSW-1 ansible_host=192.168.20.1 ansible_hostname=DSW-1
DSW-2 ansible_host=192.168.20.2 ansible_hostname=DSW-2

[access_switches]
ASW-1 ansible_host=192.168.30.1 ansible_hostname=ASW-1
ASW-2 ansible_host=192.168.30.2 ansible_hostname=ASW-2

[switches:children]
core_switches
dist_switches
access_switches

[switches:vars]
ansible_connection=ansible.netcommon.network_cli
ansible_network_os=cisco.ios.ios
ansible_user=admin
ansible_password=admin
ansible_become=true
ansible_become_method=enable
ansible_become_password=admin