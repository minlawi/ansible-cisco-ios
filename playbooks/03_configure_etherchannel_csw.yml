---
# Playbook: Configure EtherChannel (LACP Active) on Cisco IOS Core Switches
#
# To add new Port-Channel: ONLY edit host_vars/<hostname>.yml
# No playbook changes required!

- name: Configure EtherChannel (LACP Active) on Cisco IOS Core Switches
  hosts: core_switches
  gather_facts: false

  tasks:
    # ============================================================
    # PHASE 1: CONFIGURE LOGICAL PORT-CHANNEL INTERFACES
    # ============================================================

    - name: Configure Port-Channel description
      cisco.ios.ios_config:
        lines:
          - "description {{ item.description }}"
        parents: "interface port-channel {{ item.port_channel }}"
        save_when: never
      with_items: "{{ port_channels | default([]) }}"
      loop_control:
        label: "Po{{ item.port_channel }} - {{ item.description }}"
      tags: port_channel

    - name: Configure Port-Channel switchport trunk parameters
      cisco.ios.ios_config:
        lines:
          - "switchport trunk encapsulation dot1q"
          - "switchport mode trunk"
        parents: "interface port-channel {{ item.port_channel }}"
        save_when: never
      with_items: "{{ port_channels | default([]) }}"
      loop_control:
        label: "Po{{ item.port_channel }} - trunk mode"
      tags: port_channel

    - name: Configure Port-Channel allowed VLANs
      cisco.ios.ios_config:
        lines:
          - "switchport trunk allowed vlan add {{ item.vlans }}"
        parents: "interface port-channel {{ item.port_channel }}"
        save_when: never
      with_items: "{{ port_channels | default([]) }}"
      loop_control:
        label: "Po{{ item.port_channel }} - VLANs: {{ item.vlans }}"
      when: item.vlans is defined
      tags: port_channel

    - name: Configure Port-Channel LACP fast switchover
      cisco.ios.ios_config:
        lines:
          - "lacp fast-switchover"
        parents: "interface port-channel {{ item.port_channel }}"
        save_when: never
      with_items: "{{ port_channels | default([]) }}"
      loop_control:
        label: "Po{{ item.port_channel }} - LACP fast switchover"
      tags: port_channel

    # ============================================================
    # PHASE 2: CONFIGURE PHYSICAL INTERFACE MEMBERS
    # ============================================================

    - name: Configure physical interface description
      cisco.ios.ios_config:
        lines:
          - "description {{ item.description }}"
        parents: "interface {{ item.interface }}"
        save_when: never
      with_items: "{{ physical_interfaces | default([]) }}"
      loop_control:
        label: "{{ item.interface }} - {{ item.description }}"
      tags: physical

    - name: Configure physical interface switchport trunk parameters
      cisco.ios.ios_config:
        lines:
          - "switchport trunk encapsulation dot1q"
          - "switchport mode trunk"
        parents: "interface {{ item.interface }}"
        save_when: never
      with_items: "{{ physical_interfaces | default([]) }}"
      loop_control:
        label: "{{ item.interface }} - trunk mode"
      tags: physical

    - name: Configure LACP protocol and channel-group assignment (Active mode)
      cisco.ios.ios_config:
        lines:
          - "channel-protocol lacp"
          - "channel-group {{ item.port_channel }} mode active"
        parents: "interface {{ item.interface }}"
        save_when: never
      with_items: "{{ physical_interfaces | default([]) }}"
      loop_control:
        label: "{{ item.interface }} -> Po{{ item.port_channel }} (active)"
      tags: physical

    - name: Ensure physical interfaces are enabled
      cisco.ios.ios_config:
        lines:
          - "no shutdown"
        parents: "interface {{ item.interface }}"
        save_when: never
      with_items: "{{ physical_interfaces | default([]) }}"
      loop_control:
        label: "{{ item.interface }} - no shutdown"
      tags: physical

    # ============================================================
    # PHASE 3: SAVE CONFIGURATION
    # ============================================================

    - name: Save running configuration to startup configuration
      cisco.ios.ios_config:
        save_when: always
      register: save_result
      tags: write

    # ============================================================
    # PHASE 3: SUMMARY
    # ============================================================

    - name: Configuration summary
      debug:
        msg:
          - "=========================================="
          - " Configuration Complete: {{ inventory_hostname }}"
          - "=========================================="